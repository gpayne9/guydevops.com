<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Pulse ring animation -->
    <style>
      @keyframes pulse1 { 0% { opacity: 0.5; r: 80; } 100% { opacity: 0; r: 160; } }
      @keyframes pulse2 { 0% { opacity: 0.4; r: 80; } 100% { opacity: 0; r: 220; } }
      @keyframes pulse3 { 0% { opacity: 0.3; r: 80; } 100% { opacity: 0; r: 280; } }
      @keyframes glow { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
      @keyframes dash { to { stroke-dashoffset: 0; } }
      .pulse-1 { animation: pulse1 3s ease-out infinite; }
      .pulse-2 { animation: pulse2 3s ease-out 0.8s infinite; }
      .pulse-3 { animation: pulse3 3s ease-out 1.6s infinite; }
      .status-glow { animation: glow 2s ease-in-out infinite; }
      .connection-line { stroke-dasharray: 8 6; stroke-dashoffset: 28; animation: dash 1.5s linear infinite; }
    </style>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="640"/><line x1="40" y1="0" x2="40" y2="640"/>
    <line x1="80" y1="0" x2="80" y2="640"/><line x1="120" y1="0" x2="120" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="280" y1="0" x2="280" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/><line x1="360" y1="0" x2="360" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/><line x1="440" y1="0" x2="440" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="520" y1="0" x2="520" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/><line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/><line x1="680" y1="0" x2="680" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="760" y1="0" x2="760" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="840" y1="0" x2="840" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/><line x1="920" y1="0" x2="920" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/><line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/><line x1="1080" y1="0" x2="1080" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/><line x1="1160" y1="0" x2="1160" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/><line x1="1240" y1="0" x2="1240" y2="640"/>
    <line x1="1280" y1="0" x2="1280" y2="640"/>
    <line x1="0" y1="0" x2="1280" y2="0"/><line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/><line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="320" x2="1280" y2="320"/><line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="440" x2="1280" y2="440"/>
    <line x1="0" y1="480" x2="1280" y2="480"/><line x1="0" y1="520" x2="1280" y2="520"/>
    <line x1="0" y1="560" x2="1280" y2="560"/><line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="0" y1="640" x2="1280" y2="640"/>
  </g>

  <!-- ===== CENTER: Mac Mini ===== -->
  <g transform="translate(640, 300)">
    <!-- Pulse rings -->
    <circle cx="0" cy="0" class="pulse-1" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <circle cx="0" cy="0" class="pulse-2" fill="none" stroke="#d97706" stroke-width="1"/>
    <circle cx="0" cy="0" class="pulse-3" fill="none" stroke="#d97706" stroke-width="0.5"/>

    <!-- Mac Mini body -->
    <rect x="-70" y="-30" width="140" height="60" rx="12" fill="#2a2a3a" stroke="#444466" stroke-width="1.5"/>
    <!-- Mac Mini top shine -->
    <rect x="-64" y="-24" width="128" height="24" rx="6" fill="#32324a" opacity="0.6"/>
    <!-- Apple logo -->
    <g transform="translate(0, -4)" fill="#888899">
      <path d="M-4,-10 C-4,-13 -1,-16 2,-16 C2,-13 -1,-10 -4,-10Z M4,-9 C1,-9 -1,-8 -3,-8 C-5,-8 -7,-9 -9,-9 C-12,-9 -15,-6 -15,-2 C-15,4 -11,11 -8,11 C-6,11 -5,10 -3,10 C-1,10 0,11 2,11 C5,11 8,5 9,3 C6,2 4,0 4,-3 C4,-6 6,-8 7,-9 C6,-9 5,-9 4,-9Z"/>
    </g>
    <!-- Status LED -->
    <circle cx="0" cy="18" r="3" fill="#22c55e" class="status-glow" filter="url(#glow)"/>
    <!-- Label -->
    <text x="0" y="52" text-anchor="middle" fill="#888899" font-family="SF Mono, Menlo, monospace" font-size="11">Mac Mini</text>
  </g>

  <!-- ===== Connection lines ===== -->
  <!-- To laptop (top-left) -->
  <line x1="580" y1="275" x2="340" y2="180" class="connection-line" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <!-- To phone (top-right) -->
  <line x1="700" y1="275" x2="940" y2="180" class="connection-line" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <!-- To browser (bottom-right) -->
  <line x1="710" y1="330" x2="960" y2="430" class="connection-line" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <!-- To tablet (bottom-left) -->
  <line x1="570" y1="330" x2="320" y2="430" class="connection-line" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>

  <!-- ===== TOP-LEFT: Laptop ===== -->
  <g transform="translate(290, 150)">
    <!-- Screen -->
    <rect x="-40" y="-28" width="80" height="50" rx="4" fill="#1e1e2e" stroke="#555577" stroke-width="1.2"/>
    <!-- Terminal content -->
    <text x="-30" y="-10" fill="#22c55e" font-family="SF Mono, Menlo, monospace" font-size="7">$ claude</text>
    <text x="-30" y="0" fill="#666688" font-family="SF Mono, Menlo, monospace" font-size="6">connected</text>
    <rect x="-30" y="6" width="18" height="6" rx="1" fill="#22c55e" opacity="0.3"/>
    <!-- Base -->
    <path d="M-50,24 L-44,22 L44,22 L50,24 Z" fill="#444466"/>
    <text x="0" y="42" text-anchor="middle" fill="#888899" font-family="SF Mono, Menlo, monospace" font-size="10">Desktop App</text>
  </g>

  <!-- ===== TOP-RIGHT: Phone ===== -->
  <g transform="translate(990, 150)">
    <!-- Phone body -->
    <rect x="-18" y="-30" width="36" height="60" rx="6" fill="#1e1e2e" stroke="#555577" stroke-width="1.2"/>
    <!-- Screen -->
    <rect x="-14" y="-22" width="28" height="42" rx="2" fill="#0f0f17"/>
    <!-- Claude icon on screen -->
    <circle cx="0" cy="-6" r="6" fill="#d97706" opacity="0.8"/>
    <text x="0" y="-3" text-anchor="middle" fill="#1e1e2e" font-family="Arial" font-size="8" font-weight="bold">C</text>
    <!-- Status bar -->
    <rect x="-10" y="8" width="20" height="2" rx="1" fill="#22c55e" opacity="0.5"/>
    <rect x="-10" y="13" width="14" height="2" rx="1" fill="#555577" opacity="0.5"/>
    <text x="0" y="52" text-anchor="middle" fill="#888899" font-family="SF Mono, Menlo, monospace" font-size="10">Mobile App</text>
  </g>

  <!-- ===== BOTTOM-RIGHT: Browser ===== -->
  <g transform="translate(1000, 420)">
    <!-- Browser window -->
    <rect x="-45" y="-28" width="90" height="56" rx="4" fill="#1e1e2e" stroke="#555577" stroke-width="1.2"/>
    <!-- Title bar -->
    <rect x="-45" y="-28" width="90" height="12" rx="4" fill="#2a2a3a"/>
    <circle cx="-36" cy="-22" r="2.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="-28" cy="-22" r="2.5" fill="#eab308" opacity="0.7"/>
    <circle cx="-20" cy="-22" r="2.5" fill="#22c55e" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="-10" y="-25" width="42" height="6" rx="2" fill="#0f0f17"/>
    <text x="11" y="-20.5" text-anchor="middle" fill="#555577" font-family="SF Mono, Menlo, monospace" font-size="4">claude.ai/code</text>
    <!-- Content -->
    <rect x="-38" y="-10" width="30" height="3" rx="1" fill="#555577" opacity="0.4"/>
    <rect x="-38" y="-4" width="50" height="3" rx="1" fill="#d97706" opacity="0.3"/>
    <rect x="-38" y="2" width="40" height="3" rx="1" fill="#555577" opacity="0.3"/>
    <rect x="-38" y="8" width="55" height="3" rx="1" fill="#555577" opacity="0.2"/>
    <rect x="-38" y="14" width="25" height="3" rx="1" fill="#22c55e" opacity="0.3"/>
    <text x="0" y="50" text-anchor="middle" fill="#888899" font-family="SF Mono, Menlo, monospace" font-size="10">claude.ai/code</text>
  </g>

  <!-- ===== BOTTOM-LEFT: Tablet / Terminal ===== -->
  <g transform="translate(280, 420)">
    <!-- Terminal window -->
    <rect x="-50" y="-28" width="100" height="56" rx="4" fill="#1e1e2e" stroke="#555577" stroke-width="1.2"/>
    <!-- Title bar -->
    <rect x="-50" y="-28" width="100" height="12" rx="4" fill="#2a2a3a"/>
    <text x="0" y="-20" text-anchor="middle" fill="#666688" font-family="SF Mono, Menlo, monospace" font-size="5">tmux: my-project</text>
    <!-- Terminal content -->
    <text x="-42" y="-6" fill="#22c55e" font-family="SF Mono, Menlo, monospace" font-size="5.5">Remote Control</text>
    <text x="-42" y="2" fill="#555577" font-family="SF Mono, Menlo, monospace" font-size="5">Status: connected</text>
    <text x="-42" y="10" fill="#555577" font-family="SF Mono, Menlo, monospace" font-size="5">Sessions: 3/32</text>
    <text x="-42" y="18" fill="#d97706" font-family="SF Mono, Menlo, monospace" font-size="5">Uptime: 14d 7h</text>
    <text x="0" y="50" text-anchor="middle" fill="#888899" font-family="SF Mono, Menlo, monospace" font-size="10">tmux session</text>
  </g>

  <!-- ===== Center relay label ===== -->
  <g transform="translate(640, 220)">
    <rect x="-60" y="-10" width="120" height="20" rx="10" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="4" text-anchor="middle" fill="#d97706" font-family="SF Mono, Menlo, monospace" font-size="9" opacity="0.8">api.anthropic.com</text>
  </g>

  <!-- ===== Title ===== -->
  <text x="640" y="560" text-anchor="middle" fill="#ffffff" font-family="SF Pro Display, -apple-system, sans-serif" font-size="36" font-weight="600" letter-spacing="1">claude-always-on</text>
  <text x="640" y="590" text-anchor="middle" fill="#888899" font-family="SF Mono, Menlo, monospace" font-size="14">Persistent remote control sessions for Claude Code</text>

  <!-- ===== Always-on indicator ===== -->
  <g transform="translate(640, 610)">
    <circle cx="-40" cy="0" r="4" fill="#22c55e" class="status-glow" filter="url(#glow)"/>
    <text x="-28" y="4" fill="#22c55e" font-family="SF Mono, Menlo, monospace" font-size="11" opacity="0.9">always on</text>
  </g>
</svg>
